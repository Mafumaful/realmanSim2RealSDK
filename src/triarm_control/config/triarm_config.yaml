# 三臂机器人控制配置

triarm_controller:
  ros__parameters:
    namespace: "robot"
    mode: "sim"             # 运行模式: sim (Isaac Sim) / real (真实机械臂)
    joint_velocity: 30.0    # 关节运动速度 (度/秒)
    publish_rate: 50.0      # 指令发布频率 (Hz)
    enable_smooth: true     # 是否启用平滑处理
    acceleration: 100.0     # 加速度限制 (度/秒²)
    velocity_mode: "normal" # 速度模式: slow, normal, fast
    # 夹爪参数 (sim/real 分开配置, 单位: 度)
    left_gripper:
      sim_open_angle: 0.0       # sim 打开角度
      sim_close_angle: -30.0    # sim 闭合角度
      real_open_angle: 0.0      # real 打开角度
      real_close_angle: -30.0   # real 闭合角度
    right_gripper:
      sim_open_angle: 0.0       # sim 打开角度
      sim_close_angle: -30.0    # sim 闭合角度
      real_open_angle: 0.0      # real 打开角度
      real_close_angle: -30.0   # real 闭合角度

# 统一机械臂节点配置
unified_arm_node:
  ros__parameters:
    namespace: "robot"
    mode: "sim"             # sim / real
    publish_rate: 20.0      # 状态发布频率 (Hz)
    sim_joint_tolerance: 0.02   # sim运动完成检测阈值 (弧度)
    sim_motion_timeout: 40.0    # sim主等待超时 (秒)
    sim_motion_grace_period: 8.0   # 主超时后额外收敛等待 (秒)
    # A臂 (left)
    arm_a:
      ip: "192.168.1.18"
      port: 8080
      # RM65Robot IK/FK 参数 (单位: m, deg)
      base_position: [0.05457, -0.04863, 0.2273]           # 机械臂base相对转盘的位置
      base_orientation_deg: [45.0, 90.0, 0.0]              # 机械臂base相对转盘的姿态 (ZYX欧拉角)
      d6_mm: 172.5                                          # 末端 d6 参数 (RM65-6F)
    # B臂 (right)
    arm_b:
      ip: "192.168.1.19"
      port: 8080
      # RM65Robot IK/FK 参数 (单位: m, deg)
      base_position: [-0.04867, -0.05374, 0.2273]
      base_orientation_deg: [135.0, 90.0, 0.0]
      d6_mm: 172.5
    # S臂 (预留)
    arm_s:
      ip: "192.168.1.20"
      port: 8080
      # RM65Robot IK/FK 参数 (单位: m, deg)
      # TODO: 根据实际机械臂布局调整以下参数
      base_position: [0.0, 0.0, 0.0]
      base_orientation_deg: [0.0, 0.0, 0.0]
      d6_mm: 172.5

# 夹爪桥接节点配置
gripper_bridge_node:
  ros__parameters:
    mode: "sim"             # sim / real
    namespace: "robot"
    # real 模式: Modbus RTU 串口配置 (crt_ctag2f90c)
    gripper_a:
      serial_port: "/dev/ttyUSB0"
      baud_rate: 115200
      slave_addr: 1
    gripper_b:
      serial_port: "/dev/ttyUSB1"
      baud_rate: 115200
      slave_addr: 1
    # real 模式: Modbus 运动完成等待超时 (秒)
    motion_timeout: 5.0

triarm_gui:
  ros__parameters:
    namespace: "robot"
    gui_width: 700
    gui_height: 600
    # per-arm base 参数 (与 unified_arm_node 一致, 用于 GUI 内 FK/IK 计算)
    arm_a:
      base_position: [0.05457, -0.04863, 0.2273]
      base_orientation_deg: [45.0, 90.0, 0.0]
      d6_mm: 172.5
    arm_b:
      base_position: [-0.04867, -0.05374, 0.2273]
      base_orientation_deg: [135.0, 90.0, 0.0]
      d6_mm: 172.5
